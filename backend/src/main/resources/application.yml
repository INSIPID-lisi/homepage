server:
  port: 8080

spring:
  application:
    name: homepage-backend
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.163.com
    port: 465
    username: insipidknight@163.com
    password: ${hp.mail.password}

  datasource:
    url: ${hp.db.url}
    username: ${hp.db.username}
    password: ${hp.db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000
      compression:
        request:
          enabled: true
        response:
          enabled: true

app:
  security:
    login:
      max-attempts: 5
      attempt-window-seconds: 900
      lock-duration-seconds: 1800
  upload:
    path: homepage/images
    url-prefix: /uploads
  weather:
    latitude: 37.5306
    longitude: 122.0822
    cache-minutes: 60
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
